<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DasTheGamerYT - Creator Vault</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #0d0d0d;
        color: white;
        text-align: center;
    }

    .container {
        max-width: 900px;
        margin: auto;
        padding: 20px;
    }

    input, select {
        padding: 10px;
        margin: 5px;
        border: none;
        border-radius: 5px;
    }

    button {
        padding: 10px 20px;
        background-color: #1f1f1f;
        color: white;
        border: 1px solid #333;
        border-radius: 5px;
        cursor: pointer;
        margin: 5px;
    }

    button:hover {
        background-color: #333;
    }

    .hidden { display: none; }

    .box {
        background-color: #1a1a1a;
        padding: 20px;
        margin-top: 20px;
        border-radius: 10px;
    }

    .done {
        text-decoration: line-through;
        opacity: 0.5;
    }
</style>
</head>

<body>
<div class="container">

    <h1>Creator Vault</h1>

    <!-- LOGIN -->
    <div id="loginBox">
        <input type="text" id="username" placeholder="Username"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button onclick="login()">Enter Vault</button>
        <p id="loginMsg"></p>
    </div>

    <!-- VAULT -->
    <div id="vault" class="hidden">

        <h2>Welcome, DasTheGamerYT</h2>

        <!-- GAME SELECT -->
        <div class="box">
            <h3>Select Game</h3>
            <select id="gameSelect">
                <option>Fortnite</option>
                <option>ER:LC</option>
                <option>Stormworks</option>
                <option>gMod</option>
                <option>Mon Bazou</option>
            </select>
            <br>
            <button onclick="generateAll()">Generate Full Idea</button>
            <p id="idea"></p>
            <p id="title"></p>
            <p id="thumb"></p>
        </div>

        <!-- CHECKLIST -->
        <div class="box">
            <h3>Upload Checklist</h3>
            <ul id="checklist" style="text-align:left;">
                <li onclick="toggleItem(this)">Good title</li>
                <li onclick="toggleItem(this)">Eye-catching thumbnail</li>
                <li onclick="toggleItem(this)">Correct tags</li>
                <li onclick="toggleItem(this)">Description added</li>
                <li onclick="toggleItem(this)">Video trimmed</li>
            </ul>
            <button onclick="resetChecklist()">Reset Checklist</button>
        </div>

    </div>
</div>

<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (user === "DasTheGamerYT" && pass === "github") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("vault").classList.remove("hidden");
    } else {
        document.getElementById("loginMsg").innerText = "Wrong login.";
    }
}

function generateAll() {
    const game = document.getElementById("gameSelect").value;

    const data = {
        "Fortnite": [
            { idea: "Every kill upgrades my weapon", title: "Every Elimination Upgraded My Loadout...", thumb: "Weapon evolution with arrow progression" },
            { idea: "No healing challenge", title: "No Healing... Can I Still Win?", thumb: "1 HP moment with red screen effect" },
            { idea: "Only one inventory slot", title: "Winning With ONLY One Slot Was Chaos...", thumb: "Empty inventory except one item" }
        ],
        "ER:LC": [
            { idea: "Undercover cop patrol", title: "I Went Undercover In ER:LC...", thumb: "Civilian outfit vs police reveal" },
            { idea: "Only using basic police gear", title: "No Upgrades... Just Basic Gear Patrol", thumb: "Starter gear vs criminals" },
            { idea: "Responding to every callout", title: "I Responded To EVERY Callout...", thumb: "Map full of alerts" },
            { idea: "SWAT high risk raid", title: "High Risk SWAT Raid Went Wrong...", thumb: "Door breach moment" }
        ],
        "Stormworks": [
            { idea: "Bad vehicle rescue", title: "I Tried Saving Lives With A Terrible Vehicle...", thumb: "Broken vehicle struggling in water" },
            { idea: "10 minute build", title: "I Built A Rescue Boat In 10 Minutes...", thumb: "Timer + unfinished build" },
            { idea: "Extreme weather rescue", title: "Storm Rescue Almost Failed...", thumb: "Huge waves + danger" }
        ],
        "gMod": [
            { idea: "NPC war experiment", title: "NPC War Got Out Of Control...", thumb: "Huge battle chaos" },
            { idea: "Weird mods test", title: "Testing The Weirdest Mods Ever...", thumb: "Strange character close-up" },
            { idea: "Sandbox survival chaos", title: "This Sandbox Turned Into Chaos...", thumb: "Explosion scene" }
        ],
        "Mon Bazou": [
            { idea: "Start from nothing", title: "From Nothing To Rich In Mon Bazou...", thumb: "Before vs rich setup" },
            { idea: "Fastest car build", title: "I Built The FASTEST Car Possible...", thumb: "Speed blur effect" },
            { idea: "Worst money method", title: "Making Money The Worst Way Possible...", thumb: "Slow grind visual" }
        ]
    };

    const pool = data[game];
    const pick = pool[Math.floor(Math.random() * pool.length)];

    document.getElementById("idea").innerText = "Idea: " + pick.idea;
    document.getElementById("title").innerText = "Title: " + pick.title;
    document.getElementById("thumb").innerText = "Thumbnail: " + pick.thumb;
}

function toggleItem(item) {
    item.classList.toggle("done");
}

function resetChecklist() {
    let items = document.querySelectorAll("#checklist li");
    items.forEach(i => i.classList.remove("done"));
}
</script>
</body>
</html>
